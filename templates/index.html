<script>
    async function fetchLiveData() {
        try {
            const response = await fetch('/api/live-data');
            const data = await response.json();

            // Update the Date
            document.querySelector('.date-banner').innerText = data.date_banner;
            
            // Update the Nakshatra
            document.querySelector('.summary-text h2').innerText = data.nakshatra_today;
            
            // Update the first three planets in the table as an example
            const tableRows = document.querySelectorAll('table tr');
            tableRows[0].cells[1].innerText = data.planets.Sun;
            tableRows[1].cells[1].innerText = data.planets.Moon;
            tableRows[2].cells[1].innerText = data.planets.Mercury;

        } catch (error) {
            console.error("Error fetching live data:", error);
        }
    }

    // Fetch data immediately when the page loads, and every 5 minutes after
    fetchLiveData();
    setInterval(fetchLiveData, 300000); 
</script>
